<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Auth Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        
        .section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00ff88;
        }
        
        button {
            padding: 12px 24px;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            color: #0a0a0a;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #00dd77;
        }
        
        button.danger {
            background: #ff4444;
            color: white;
        }
        
        button.danger:hover {
            background: #dd3333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        thead {
            background: #252525;
        }
        
        th {
            padding: 15px;
            text-align: left;
            color: #00ff88;
            font-weight: 600;
            border-bottom: 2px solid #333;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #2a2a2a;
        }
        
        tr:hover {
            background: #1f1f1f;
        }
        
        .mono {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        
        .status {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status.active {
            background: #00ff8820;
            color: #00ff88;
        }
        
        .status.expired {
            background: #ff444420;
            color: #ff4444;
        }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        .actions button {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-radius: 6px;
            border-left: 4px solid #00ff88;
        }
        
        .result.error {
            border-left-color: #ff4444;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            color: #00ff88;
            font-weight: 700;
        }
        
        .stat-label {
            margin-top: 8px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Simple Auth Admin</h1>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalLicenses">0</div>
                <div class="stat-label">Total Licenses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeLicenses">0</div>
                <div class="stat-label">Active Licenses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="boundLicenses">0</div>
                <div class="stat-label">HWID Bound</div>
            </div>
        </div>
        
        <div class="section">
            <h2>Create New License</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" value="User">
            </div>
            <div class="form-group">
                <label>Duration</label>
                <select id="duration">
                    <option value="86400">1 Day</option>
                    <option value="604800">7 Days</option>
                    <option value="2592000" selected>30 Days</option>
                    <option value="7776000">90 Days</option>
                    <option value="31536000">1 Year</option>
                    <option value="9999999999">Lifetime</option>
                </select>
            </div>
            <button onclick="createLicense()">Create License</button>
            <div id="createResult"></div>
        </div>
        
        <div class="section">
            <h2>Licenses</h2>
            <button onclick="loadLicenses()">Refresh</button>
            <table>
                <thead>
                    <tr>
                        <th>License Key</th>
                        <th>Username</th>
                        <th>HWID</th>
                        <th>Expiry</th>
                        <th>Status</th>
                        <th>Last Used</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="licensesTable">
                    <tr><td colspan="7" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="section">
            <h2>Audit Logs</h2>
            <button onclick="loadLogs()">Refresh</button>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Event</th>
                        <th>License Key</th>
                        <th>IP Address</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="logsTable">
                    <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        const API_URL = '';
        
        function formatTimestamp(timestamp) {
            if (timestamp === 9999999999) return 'Lifetime';
            if (timestamp === 0) return 'Never';
            return new Date(timestamp * 1000).toLocaleString();
        }
        
        function formatDuration(seconds) {
            if (seconds >= 9999999999) return 'Lifetime';
            const days = Math.floor(seconds / 86400);
            if (days > 0) return `${days} days`;
            const hours = Math.floor(seconds / 3600);
            if (hours > 0) return `${hours} hours`;
            return `${seconds} seconds`;
        }
        
        async function createLicense() {
            const username = document.getElementById('username').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            try {
                const response = await fetch(`${API_URL}/api/admin/license`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, duration})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('createResult').innerHTML = `
                        <div class="result">
                            <strong>License Created!</strong><br>
                            <span class="mono">${data.license_key}</span><br>
                            <small>Expires: ${formatTimestamp(data.expiry)}</small>
                        </div>
                    `;
                    loadLicenses();
                } else {
                    document.getElementById('createResult').innerHTML = `
                        <div class="result error">Error: ${data.message}</div>
                    `;
                }
            } catch (error) {
                document.getElementById('createResult').innerHTML = `
                    <div class="result error">Error: ${error.message}</div>
                `;
            }
        }
        
        async function loadLicenses() {
            try {
                const response = await fetch(`${API_URL}/api/admin/licenses`);
                const data = await response.json();
                
                const tbody = document.getElementById('licensesTable');
                tbody.innerHTML = '';
                
                let total = 0;
                let active = 0;
                let bound = 0;
                const now = Math.floor(Date.now() / 1000);
                
                data.licenses.forEach(lic => {
                    total++;
                    if (lic.expiry > now || lic.expiry === 9999999999) active++;
                    if (lic.hwid) bound++;
                    
                    const isActive = lic.expiry > now || lic.expiry === 9999999999;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="mono">${lic.license_key}</td>
                        <td>${lic.username}</td>
                        <td class="mono">${lic.hwid ? lic.hwid.substring(0, 16) + '...' : 'Not bound'}</td>
                        <td>${formatTimestamp(lic.expiry)}</td>
                        <td><span class="status ${isActive ? 'active' : 'expired'}">${isActive ? 'Active' : 'Expired'}</span></td>
                        <td>${formatTimestamp(lic.last_used)}</td>
                        <td class="actions">
                            <button onclick="resetHWID('${lic.id}')">Reset HWID</button>
                            <button onclick="addTime('${lic.id}')">Add Time</button>
                            <button class="danger" onclick="deleteLicense('${lic.id}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                document.getElementById('totalLicenses').textContent = total;
                document.getElementById('activeLicenses').textContent = active;
                document.getElementById('boundLicenses').textContent = bound;
                
            } catch (error) {
                document.getElementById('licensesTable').innerHTML = `
                    <tr><td colspan="7" style="text-align: center; color: #ff4444;">Error: ${error.message}</td></tr>
                `;
            }
        }
        
        async function resetHWID(licenseId) {
            if (!confirm('Reset HWID for this license?')) return;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/license/${licenseId}/hwid`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('HWID reset successfully');
                    loadLicenses();
                } else {
                    alert('Failed to reset HWID');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function addTime(licenseId) {
            const days = prompt('Add days (1, 7, 30):');
            if (!days) return;
            
            const seconds = parseInt(days) * 86400;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/license/${licenseId}/time`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({seconds})
                });
                
                if (response.ok) {
                    alert('Time added successfully');
                    loadLicenses();
                } else {
                    alert('Failed to add time');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function deleteLicense(licenseId) {
            if (!confirm('Delete this license? This cannot be undone!')) return;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/license/${licenseId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('License deleted');
                    loadLicenses();
                } else {
                    alert('Failed to delete license');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function loadLogs() {
            try {
                const response = await fetch(`${API_URL}/api/admin/logs`);
                const data = await response.json();
                
                const tbody = document.getElementById('logsTable');
                tbody.innerHTML = '';
                
                data.logs.forEach(log => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${formatTimestamp(log.created_at)}</td>
                        <td>${log.event_type}</td>
                        <td class="mono">${log.license_key || '-'}</td>
                        <td>${log.ip_address || '-'}</td>
                        <td>${log.details || '-'}</td>
                    `;
                    tbody.appendChild(row);
                });
                
            } catch (error) {
                document.getElementById('logsTable').innerHTML = `
                    <tr><td colspan="5" style="text-align: center; color: #ff4444;">Error: ${error.message}</td></tr>
                `;
            }
        }
        
        // Load data on page load
        loadLicenses();
        loadLogs();
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadLicenses();
            loadLogs();
        }, 30000);
    </script>
</body>
</html>
